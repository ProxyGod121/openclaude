<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>OpenClaude Chatbot</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f2f2f2; margin: 0; padding: 20px; }\n        #chat-container { border: 1px solid #ccc; border-radius: 5px; background: white; padding: 10px; height: 400px; overflow-y: scroll; }\n        #message-input { width: calc(100% - 90px); padding: 10px; }\n        #send-button { padding: 10px; }\n        .message { margin: 5px 0; }\n        .user { font-weight: bold; }\n    </style>\n</head>\n<body>\n    <h1>OpenClaude Chatbot</h1>\n    <div id="chat-container"></div>\n    <input id="message-input" type="text" placeholder="Type a message...">\n    <button id="send-button">Send</button>\n    <script>\n        const chatContainer = document.getElementById('chat-container');\n        const messageInput = document.getElementById('message-input');\n        const sendButton = document.getElementById('send-button');\n        const apiUrl = 'http://localhost:5000/api/chat'; // Change to your OpenClaude backend API URL\n        \n        sendButton.addEventListener('click', sendMessage);\n        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });\n        \n        function sendMessage() {\n            const message = messageInput.value;\n            if (!message) return;\n            appendMessage('You', message);\n            messageInput.value = '';\n            fetch(apiUrl, {\n                method: 'POST',\n                headers: { 'Content-Type': 'application/json' },\n                body: JSON.stringify({ message })\n            })\n            .then(response => response.json())\n            .then(data => {\n                appendMessage('OpenClaude', data.reply);\n            });\n        }\n        \n        function appendMessage(sender, text) {\n            const messageDiv = document.createElement('div');\n            messageDiv.classList.add('message');\n            messageDiv.innerHTML = `<span class='user'>${sender}:</span> ${text}`;\n            chatContainer.appendChild(messageDiv);\n            chatContainer.scrollTop = chatContainer.scrollHeight;\n        }\n    </script>\n</body>\n</html>
